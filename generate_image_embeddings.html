<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generate Image Embeddings — VP Library</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', system-ui, sans-serif; background: #0F172A; color: #E2E8F0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
  h1  { font-size: 22px; font-weight: 700; margin-bottom: 4px; color: #F1F5F9; }
  .sub { font-size: 13px; color: #64748B; margin-bottom: 32px; }
  .card { background: #1E293B; border: 1px solid #334155; border-radius: 14px; padding: 28px; width: 100%; max-width: 720px; margin-bottom: 20px; }
  .card-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #64748B; margin-bottom: 14px; }
  .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #64748B; flex-shrink: 0; }
  .dot.green { background: #22C55E; }
  .dot.yellow { animation: pulse 1s infinite; background: #F59E0B; }
  .dot.red { background: #EF4444; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .status-text { font-size: 13px; color: #CBD5E1; }
  .progress-wrap { background: #0F172A; border-radius: 99px; height: 8px; overflow: hidden; margin: 16px 0; }
  .progress-bar  { height: 100%; background: linear-gradient(90deg, #6366F1, #8B5CF6); border-radius: 99px; transition: width .4s; }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  .stat-box { background: #0F172A; border-radius: 8px; padding: 12px; text-align: center; }
  .stat-num  { font-size: 24px; font-weight: 800; color: #A5B4FC; }
  .stat-lbl  { font-size: 11px; color: #64748B; margin-top: 2px; }
  .log-box { background: #0F172A; border-radius: 8px; padding: 14px; font-family: monospace; font-size: 12px; max-height: 260px; overflow-y: auto; line-height: 1.7; }
  .log-ok   { color: #22C55E; }
  .log-skip { color: #64748B; }
  .log-err  { color: #F87171; }
  .log-info { color: #60A5FA; }
  .btn { padding: 12px 28px; border-radius: 10px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity .15s; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary { background: #6366F1; color: #fff; }
  .btn-secondary { background: #1E293B; border: 1px solid #334155; color: #CBD5E1; }
  .btn-danger { background: #7F1D1D; color: #FCA5A5; border: 1px solid #991B1B; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
  .scene-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
  .scene-thumb { position: relative; aspect-ratio: 16/9; border-radius: 6px; overflow: hidden; background: #0F172A; }
  .scene-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .scene-thumb .badge { position: absolute; bottom: 4px; left: 4px; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 4px; }
  .badge-done  { background: #16A34A; color: #fff; }
  .badge-pend  { background: #1E293B; color: #64748B; }
  .badge-err   { background: #991B1B; color: #FCA5A5; }
  .scene-id   { font-size: 10px; color: #64748B; text-align: center; margin-top: 3px; }
</style>
</head>
<body>

<h1>🧠 Generate Image Embeddings</h1>
<p class="sub">CLIP ViT-B/32 · 512-dimensional · cosine similarity · เก็บใน Supabase pgvector</p>

<!-- Model Status -->
<div class="card">
  <div class="card-title">Model Status</div>
  <div class="status-row">
    <div class="dot" id="modelDot"></div>
    <div class="status-text" id="modelStatus">รอเริ่มต้น…</div>
  </div>
  <div class="progress-wrap" id="modelProgressWrap" style="display:none">
    <div class="progress-bar" id="modelProgress" style="width:0%"></div>
  </div>
</div>

<!-- Stats -->
<div class="card">
  <div class="card-title">Progress</div>
  <div class="stats-grid">
    <div class="stat-box"><div class="stat-num" id="statTotal">—</div><div class="stat-lbl">ฉากทั้งหมด</div></div>
    <div class="stat-box"><div class="stat-num" id="statDone">—</div><div class="stat-lbl">มี Embedding แล้ว</div></div>
    <div class="stat-box"><div class="stat-num" id="statPending">—</div><div class="stat-lbl">ยังไม่มี</div></div>
    <div class="stat-box"><div class="stat-num" id="statErr">0</div><div class="stat-lbl">Error</div></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar" id="embedProgress" style="width:0%"></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" id="btnRun" onclick="runEmbedding(false)">▶ Generate ทั้งหมดที่ยังไม่มี</button>
    <button class="btn btn-danger"  id="btnRerun" onclick="runEmbedding(true)">↺ Re-generate ทั้งหมด (Overwrite)</button>
    <button class="btn btn-secondary" onclick="loadScenes()">🔄 Refresh</button>
  </div>
</div>

<!-- Log -->
<div class="card">
  <div class="card-title">Log</div>
  <div class="log-box" id="logBox"><span class="log-info">กด Generate เพื่อเริ่ม…</span></div>
</div>

<!-- Scene Grid -->
<div class="card">
  <div class="card-title">ฉากทั้งหมด</div>
  <div class="scene-grid" id="sceneGrid"></div>
</div>

<script type="module">
// ── Config ─────────────────────────────────────────────────────────────────
const SUPA_URL  = 'https://pgaqdqbjyewwckpslyvx.supabase.co';
const SUPA_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBnYXFkcWJqeWV3d2NrcHNseXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMTU4NjIsImV4cCI6MjA4OTc5MTg2Mn0.YKhpyvgXHW3vLYpifJyYHYndlddLzVooKuxoagECZtU';
const MODEL_ID  = 'Xenova/clip-vit-base-patch32';
const TRANSFORMERS_URL = 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js';

const sc = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── State ──────────────────────────────────────────────────────────────────
let processor = null, visionModel = null;
let scenes = [], errCount = 0;

// ── DOM helpers ────────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const log = (msg, cls='log-info') => {
  const box = $('logBox');
  box.innerHTML += `<div class="${cls}">${msg}</div>`;
  box.scrollTop = box.scrollHeight;
};

// ── Load model ─────────────────────────────────────────────────────────────
async function loadModel() {
  if (processor && visionModel) return true;

  $('modelDot').className = 'dot yellow';
  $('modelStatus').textContent = 'โหลด CLIP vision model… (ครั้งแรกอาจใช้เวลา 1–2 นาที)';
  $('modelProgressWrap').style.display = '';

  try {
    const { AutoProcessor, CLIPVisionModelWithProjection, env } = await import(TRANSFORMERS_URL);
    // Allow remote model loading
    env.allowRemoteModels = true;
    env.allowLocalModels  = false;

    log('📥 Loading AutoProcessor…');
    processor = await AutoProcessor.from_pretrained(MODEL_ID, {
      progress_callback: p => {
        if (p.progress) $('modelProgress').style.width = Math.round(p.progress) + '%';
      }
    });

    log('📥 Loading CLIPVisionModelWithProjection (quantized)…');
    visionModel = await CLIPVisionModelWithProjection.from_pretrained(MODEL_ID, {
      quantized: true,
      progress_callback: p => {
        if (p.progress) $('modelProgress').style.width = Math.round(p.progress) + '%';
      }
    });

    $('modelDot').className = 'dot green';
    $('modelStatus').textContent = `✅ Model พร้อม — ${MODEL_ID}`;
    $('modelProgress').style.width = '100%';
    log('✅ Model loaded!', 'log-ok');
    return true;
  } catch (err) {
    $('modelDot').className = 'dot red';
    $('modelStatus').textContent = '❌ โหลด model ล้มเหลว: ' + err.message;
    log('❌ Model error: ' + err.message, 'log-err');
    return false;
  }
}

// ── Generate single embedding ──────────────────────────────────────────────
async function embedImage(imageUrl) {
  const { RawImage } = await import(TRANSFORMERS_URL);

  // Fetch image — add cache-buster to avoid CORS cached errors
  const img = await RawImage.fromURL(imageUrl.includes('?') ? imageUrl : imageUrl + '?embed=1');

  const inputs = await processor(img);
  const { image_embeds } = await visionModel(inputs);

  // L2 normalize to unit vector (cosine similarity)
  const raw  = Array.from(image_embeds.data);
  const norm = Math.sqrt(raw.reduce((s, v) => s + v * v, 0));
  return norm > 0 ? raw.map(v => v / norm) : raw;
}

// ── Load scenes from DB ────────────────────────────────────────────────────
window.loadScenes = async function() {
  const { data, error } = await sc
    .from('scenes')
    .select('id, title, image_url, thumb_url, embedding')
    .order('id');

  if (error) { log('❌ DB error: ' + error.message, 'log-err'); return; }
  scenes = data;
  updateStats();
  renderGrid();
};

function updateStats() {
  const done    = scenes.filter(s => s.embedding).length;
  const pending = scenes.length - done;
  $('statTotal').textContent   = scenes.length;
  $('statDone').textContent    = done;
  $('statPending').textContent = pending;
  $('statErr').textContent     = errCount;
  $('embedProgress').style.width = scenes.length ? Math.round(done/scenes.length*100) + '%' : '0%';
}

function renderGrid() {
  $('sceneGrid').innerHTML = scenes.map(s => {
    const thumb = s.thumb_url || s.image_url || '';
    const hasBadge = s.embedding
      ? '<span class="badge badge-done">✓</span>'
      : '<span class="badge badge-pend">—</span>';
    return `<div>
      <div class="scene-thumb">
        <img src="${thumb}" onerror="this.style.display='none'" loading="lazy">
        ${hasBadge}
      </div>
      <div class="scene-id" id="grid-${s.id}">${s.id}</div>
    </div>`;
  }).join('');
}

// ── Main embed loop ────────────────────────────────────────────────────────
window.runEmbedding = async function(forceAll = false) {
  $('btnRun').disabled   = true;
  $('btnRerun').disabled = true;

  const ok = await loadModel();
  if (!ok) { $('btnRun').disabled = false; $('btnRerun').disabled = false; return; }

  const targets = forceAll
    ? scenes
    : scenes.filter(s => !s.embedding);

  log(`\n▶ Starting — ${targets.length} scene(s) to process (forceAll=${forceAll})`, 'log-info');
  errCount = 0;
  let done = 0;

  for (const scene of targets) {
    const imgUrl = scene.image_url;
    if (!imgUrl) {
      log(`⚠️  ${scene.id}: ไม่มี image_url — ข้าม`, 'log-skip');
      continue;
    }

    const label = document.getElementById('grid-' + scene.id);
    if (label) label.style.color = '#F59E0B';

    try {
      log(`⏳ ${scene.id}: generating embedding…`);
      const embedding = await embedImage(imgUrl);

      const { error } = await sc.from('scenes')
        .update({ embedding })
        .eq('id', scene.id);

      if (error) throw new Error(error.message);

      // Update local state
      const idx = scenes.findIndex(s => s.id === scene.id);
      if (idx >= 0) scenes[idx].embedding = embedding;

      done++;
      log(`✅ ${scene.id}: saved (dim=${embedding.length}, norm≈${Math.sqrt(embedding.reduce((s,v)=>s+v*v,0)).toFixed(4)})`, 'log-ok');
      if (label) label.style.color = '#22C55E';

      // Update thumb badge
      const thumb = document.querySelector(`#grid-${scene.id}`)?.previousElementSibling?.querySelector('.badge');
      if (thumb) { thumb.className = 'badge badge-done'; thumb.textContent = '✓'; }

    } catch (err) {
      errCount++;
      log(`❌ ${scene.id}: ${err.message}`, 'log-err');
      if (label) label.style.color = '#EF4444';
    }

    updateStats();
    // Small breathing room for UI updates
    await new Promise(r => setTimeout(r, 100));
  }

  log(`\n🏁 Done — ${done}/${targets.length} succeeded, ${errCount} errors`, done === targets.length ? 'log-ok' : 'log-err');
  $('btnRun').disabled   = false;
  $('btnRerun').disabled = false;
  renderGrid();
};

// ── Init ───────────────────────────────────────────────────────────────────
await loadScenes();
// Pre-load model in background
loadModel();
</script>
</body>
</html>
