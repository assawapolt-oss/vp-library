<!DOCTYPE html>
<html lang="en">
<head>

<title>About — THE STANDARD VP Library</title>

<style>

:root {
  --bg:        #0A0A0C;
  --bone:      #F0ECE4;
  --bone-dim:  #A09C94;
  --bone-faint:#3C3C40;
  --gold:      #C4A266;
  --gold-dim:  #6B5633;
  --muted:     #58585E;
  --font-sans: 'Instrument Sans', system-ui, sans-serif;
  --font-disp: 'Bricolage Grotesque', system-ui, sans-serif;
  --font-serif:'Instrument Serif', Georgia, serif;
  --font-mono: 'IBM Plex Mono', monospace;
  --card-h:    clamp(140px, 22vh, 210px);
  --card-w:    calc(var(--card-h) * 16 / 9);
  --gap:       14px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--bone);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ══════════════════════════════════════════════════
   MARQUEE STAGE
══════════════════════════════════════════════════ */
#stage {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: var(--gap);
  z-index: 0;
}

/* One row wrapper — clips overflow */
.row-wrap {
  overflow: hidden;
  height: var(--card-h);
  flex-shrink: 0;
}

/* The scrolling track — width set by JS */
.row-track {
  display: flex;
  gap: var(--gap);
  will-change: transform;
  height: 100%;
}

.row-track.left  { animation: scrollLeft  var(--dur, 18s) linear infinite; }
.row-track.right { animation: scrollRight var(--dur, 18s) linear infinite; }

@keyframes scrollLeft  {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}
@keyframes scrollRight {
  from { transform: translateX(-50%); }
  to   { transform: translateX(0); }
}

/* Pause on hover */
#stage:hover .row-track { animation-play-state: paused; }

/* Individual card */
.scene-card {
  flex-shrink: 0;
  width: var(--card-w);
  height: var(--card-h);
  border-radius: 3px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,.06);
  position: relative;
  background: #111;
}

.scene-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: opacity .4s ease;
}

/* Bottom micro-label */
.scene-card-title {
  position: absolute;
  bottom: 6px; left: 8px; right: 8px;
  font-family: var(--font-mono);
  font-size: 7px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(240,236,228,.3);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  pointer-events: none;
}

/* ══════════════════════════════════════════════════
   OVERLAYS
══════════════════════════════════════════════════ */
/* Dark fade top/bottom */
.ov-top {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 28vh;
  z-index: 1;
  background: linear-gradient(to bottom, var(--bg) 0%, transparent 100%);
  pointer-events: none;
}
.ov-bottom {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 28vh;
  z-index: 1;
  background: linear-gradient(to top, var(--bg) 0%, transparent 100%);
  pointer-events: none;
}
/* Center fog — makes credit text readable */
.ov-center {
  position: fixed;
  inset: 0;
  z-index: 2;
  background: radial-gradient(
    ellipse 55% 55% at 50% 50%,
    rgba(10,10,12,.82) 0%,
    rgba(10,10,12,.38) 60%,
    transparent 100%
  );
  pointer-events: none;
}
/* Left/right edge fade */
.ov-left {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: 120px;
  z-index: 1;
  background: linear-gradient(to right, var(--bg) 0%, transparent 100%);
  pointer-events: none;
}
.ov-right {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 120px;
  z-index: 1;
  background: linear-gradient(to left, var(--bg) 0%, transparent 100%);
  pointer-events: none;
}

/* ══════════════════════════════════════════════════
   CREDIT
══════════════════════════════════════════════════ */
#credit {
  position: fixed;
  inset: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 24px;
  pointer-events: none;
  opacity: 0;
  transition: opacity .9s ease .3s;
}
#credit.visible { opacity: 1; }

.cr-rule-top {
  width: 1px; height: 40px;
  background: linear-gradient(to bottom, transparent, var(--gold-dim));
  margin: 0 auto 26px;
}
.cr-eyebrow {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: .75;
  margin-bottom: 18px;
}
.cr-name {
  font-family: var(--font-disp);
  font-size: clamp(26px, 3.8vw, 50px);
  font-weight: 300;
  letter-spacing: 0.1em;
  color: var(--bone);
  line-height: 1.1;
  margin-bottom: 5px;
}
.cr-name-th {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: clamp(12px, 1.3vw, 15px);
  color: var(--bone-dim);
  letter-spacing: .06em;
  margin-bottom: 20px;
}
.cr-divider {
  width: 28px; height: 1px;
  background: var(--gold-dim);
  margin: 0 auto 16px;
}
.cr-roles {
  font-family: var(--font-mono);
  font-size: clamp(9px, .95vw, 11px);
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--bone-dim);
  line-height: 2.1;
  margin-bottom: 6px;
}
.cr-org {
  font-family: var(--font-mono);
  font-size: clamp(7px, .8vw, 9px);
  letter-spacing: .24em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 28px;
}
.cr-linkedin {
  pointer-events: all;
  display: inline-flex;
  align-items: center;
  gap: 9px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  border: 1px solid var(--bone-faint);
  padding: 8px 20px;
  transition: color .2s, border-color .2s, background .2s;
}
.cr-linkedin:hover {
  color: var(--gold);
  border-color: var(--gold-dim);
  background: rgba(196,162,102,.05);
}
.cr-linkedin svg { width: 11px; height: 11px; fill: currentColor; flex-shrink: 0; }
.cr-rule-bottom {
  width: 1px; height: 40px;
  background: linear-gradient(to top, transparent, var(--gold-dim));
  margin: 26px auto 0;
}

/* ══════════════════════════════════════════════════
   CHROME
══════════════════════════════════════════════════ */
.back-link {
  position: fixed;
  top: 24px; left: 24px;
  z-index: 20;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  display: flex; align-items: center; gap: 7px;
  transition: color .2s;
}
.back-link:hover { color: var(--bone-dim); }
.back-link::before { content: '←'; }

.project-label {
  position: fixed;
  bottom: 22px; right: 24px;
  z-index: 20;
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--bone-faint);
  text-align: right;
  line-height: 2;
  pointer-events: none;
}

/* ══════════════════════════════════════════════════
   LOADER
══════════════════════════════════════════════════ */
#loader {
  position: fixed; inset: 0; z-index: 100;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  transition: opacity .8s ease;
}
#loader.fade { opacity: 0; pointer-events: none; }
.ld { display: flex; gap: 8px; }
.ld span {
  width: 4px; height: 4px;
  background: var(--gold-dim);
  border-radius: 50%;
  animation: ldp 1.4s infinite;
}
.ld span:nth-child(2) { animation-delay: .2s; }
.ld span:nth-child(3) { animation-delay: .4s; }
@keyframes ldp { 0%,100%{opacity:.15} 50%{opacity:1} }

/* ══════════════════════════════════════════════════
   MOBILE
══════════════════════════════════════════════════ */
@media (max-width: 640px) {
  :root { --card-h: 120px; --gap: 10px; }
  .ov-top, .ov-bottom { height: 20vh; }
  .ov-left, .ov-right { width: 60px; }
}

</style>
</head>
<body>

</div></div>

<div id="stage"></div>

<!-- Overlays -->
<div class="ov-top"></div>
<div class="ov-bottom"></div>

<div class="ov-right"></div>
<div class="ov-center"></div>

<!-- Back -->
<a href="index.html" class="back-link">VP Library</a>

<!-- Credit -->
<div id="credit">

<script>
const SB_URL  = 'https://pgaqdqbjyewwckpslyvx.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBnYXFkcWJqeWV3d2NrcHNseXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMTU4NjIsImV4cCI6MjA4OTc5MTg2Mn0.YKhpyvgXHW3vLYpifJyYHYndlddLzVooKuxoagECZtU';
const _SB = supabase.createClient(SB_URL, SB_ANON);

// Row configs: direction + speed (seconds per full loop)
const ROWS = [
  { dir: 'left',  dur: 28 },
  { dir: 'right', dur: 22 },
  { dir: 'left',  dur: 32 },
  { dir: 'right', dur: 25 },
];

const CARDS_PER_SET = 10; // cards per half-track (duplicated for seamless loop)

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function cardHTML(scene) {
  const url = scene.thumb_url || scene.image_url || '';
  const title = scene.title || '';
  return `<div class="scene-card">
    <img src="${url}" alt="${title}" loading="lazy" decoding="async">
    <div class="scene-card-title">${title}</div>
  </div>`;
}

function buildRow(scenes, rowCfg, rowIdx) {
  // Slice a unique chunk for this row, fallback to repeat if fewer scenes
  const total = scenes.length;
  const start = (rowIdx * CARDS_PER_SET) % total;
  const pool = [];
  for (let i = 0; i < CARDS_PER_SET; i++) {
    pool.push(scenes[(start + i) % total]);
  }

  const wrap = document.createElement('div');
  wrap.className = 'row-wrap';

  const track = document.createElement('div');
  track.className = `row-track ${rowCfg.dir}`;
  track.style.setProperty('--dur', `${rowCfg.dur}s`);

  // Two identical sets for seamless loop
  const set = pool.map(cardHTML).join('');
  track.innerHTML = set + set;

  wrap.appendChild(track);
  return wrap;
}

async function init() {
  let scenes = [];

  try {
    const { data, error } = await _SB
      .from('scenes')
      .select('id, title, image_url, thumb_url')
      .eq('active', true)
      .limit(120);
    if (!error && data && data.length) scenes = shuffle(data);
  } catch(e) { console.warn('[about]', e); }

  // Fallback without active filter
  if (!scenes.length) {
    try {
      const { data } = await _SB
        .from('scenes')
        .select('id, title, image_url, thumb_url')
        .limit(120);
      if (data && data.length) scenes = shuffle(data);
    } catch(e) { console.warn('[about fallback]', e); }
  }

  const stage = document.getElementById('stage');

  if (scenes.length) {
    ROWS.forEach((cfg, i) => {
      stage.appendChild(buildRow(scenes, cfg, i));
    });
  }

  // Show credit
  setTimeout(() => document.getElementById('credit').classList.add('visible'), 100);

  // Hide loader
  const ld = document.getElementById('loader');
  ld.classList.add('fade');
  setTimeout(() => ld.remove(), 900);
}

init();
</script>
