<style>
:root {
  --bg:       #0A0A0C;
  --bone:     #F0ECE4;
  --bone-dim: #A09C94;
  --bone-fnt: #3C3C40;
  --gold:     #C4A266;
  --gold-dim: #6B5633;
  --muted:    #58585E;
  --f-sans:   'Instrument Sans', system-ui, sans-serif;
  --f-disp:   'Bricolage Grotesque', system-ui, sans-serif;
  --f-serif:  'Instrument Serif', Georgia, serif;
  --f-mono:   'IBM Plex Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--bone); font-family: var(--f-sans); -webkit-font-smoothing: antialiased; }

/* ── Stage ─────────────────────────────────────── */
#stage {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  justify-content: center; gap: 20px;
  padding: 0;
}

/* ── Row ────────────────────────────────────────── */
.row-wrap { overflow: hidden; flex-shrink: 0; height: 200px; }

/* track: must be width: max-content so % translate works on its OWN width */
.row-track {
  display: flex;
  gap: 18px;
  width: max-content;
  height: 100%;
}

/* ── Card ────────────────────────────────────────── */
.sc {
  flex-shrink: 0;
  width: 356px;      /* 200 × 16/9 */
  height: 200px;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,.10);
  box-shadow: 0 8px 32px rgba(0,0,0,.6), 0 1px 4px rgba(0,0,0,.4);
  background: #111116;
  position: relative;
  transition: transform .25s ease, box-shadow .25s ease;
}
.sc:hover {
  transform: scale(1.03) translateY(-3px);
  box-shadow: 0 16px 48px rgba(0,0,0,.8), 0 1px 4px rgba(0,0,0,.4);
  z-index: 2;
}
.sc img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}
/* bottom fade + title */
.sc::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(10,10,12,.55) 0%, transparent 50%);
  pointer-events: none;
}
.sc-title {
  position: absolute;
  bottom: 9px; left: 11px; right: 11px;
  z-index: 2;
  font-family: var(--f-mono);
  font-size: 8px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: rgba(240,236,228,.4);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  pointer-events: none;
}

/* ── Overlays ────────────────────────────────────── */
.ov { position: fixed; pointer-events: none; z-index: 5; }
.ov-t { top:0;left:0;right:0;height:32vh; background:linear-gradient(to bottom,var(--bg) 0%,transparent 100%); }
.ov-b { bottom:0;left:0;right:0;height:32vh; background:linear-gradient(to top,var(--bg) 0%,transparent 100%); }
.ov-l { top:0;left:0;bottom:0;width:100px; background:linear-gradient(to right,var(--bg) 0%,transparent 100%); }
.ov-r { top:0;right:0;bottom:0;width:100px; background:linear-gradient(to left,var(--bg) 0%,transparent 100%); }
.ov-c {
  inset:0;
  background: radial-gradient(ellipse 48% 52% at 50% 50%,
    rgba(10,10,12,.88) 0%,
    rgba(10,10,12,.50) 55%,
    transparent 100%);
}

/* ── Credit ──────────────────────────────────────── */
#cred {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  padding: 40px 24px;
  pointer-events: none;
  opacity: 0; transition: opacity .9s ease .2s;
}
#cred.on { opacity: 1; }

.c-rule { width: 1px; height: 40px; margin: 0 auto; }
.c-rule.top { background: linear-gradient(to bottom, transparent, var(--gold-dim)); margin-bottom: 24px; }
.c-rule.bot { background: linear-gradient(to top,   transparent, var(--gold-dim)); margin-top: 24px; }

.c-eye {
  font-family: var(--f-mono); font-size: 8px;
  letter-spacing: .26em; text-transform: uppercase;
  color: var(--gold); opacity: .7; margin-bottom: 16px;
}
.c-name {
  font-family: var(--f-disp);
  font-size: clamp(26px, 3.6vw, 48px);
  font-weight: 300; letter-spacing: .1em;
  color: var(--bone); line-height: 1.1; margin-bottom: 5px;
}
.c-nameth {
  font-family: var(--f-serif); font-style: italic;
  font-size: clamp(12px, 1.2vw, 15px);
  color: var(--bone-dim); letter-spacing: .06em; margin-bottom: 18px;
}
.c-div { width: 28px; height: 1px; background: var(--gold-dim); margin: 0 auto 14px; }
.c-role {
  font-family: var(--f-mono); font-size: clamp(9px,.9vw,10px);
  letter-spacing: .2em; text-transform: uppercase;
  color: var(--bone-dim); line-height: 2.2; margin-bottom: 5px;
}
.c-org {
  font-family: var(--f-mono); font-size: clamp(7px,.75vw,9px);
  letter-spacing: .26em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 26px;
}
.c-li {
  pointer-events: all;
  display: inline-flex; align-items: center; gap: 9px;
  font-family: var(--f-mono); font-size: 9px;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--muted); text-decoration: none;
  border: 1px solid var(--bone-fnt); padding: 8px 20px;
  transition: color .2s, border-color .2s, background .2s;
}
.c-li:hover { color: var(--gold); border-color: var(--gold-dim); background: rgba(196,162,102,.05); }
.c-li svg { width: 11px; height: 11px; fill: currentColor; flex-shrink: 0; }

/* ── Chrome ──────────────────────────────────────── */
.back {
  position: fixed; top: 24px; left: 24px; z-index: 20;
  font-family: var(--f-mono); font-size: 9px;
  letter-spacing: .16em; text-transform: uppercase;
  color: var(--muted); text-decoration: none;
  display: flex; align-items: center; gap: 7px;
  transition: color .2s;
}
.back:hover { color: var(--bone-dim); }
.back::before { content: '←'; }

.badge {
  position: fixed; bottom: 22px; right: 24px; z-index: 20;
  font-family: var(--f-mono); font-size: 8px;
  letter-spacing: .2em; text-transform: uppercase;
  color: var(--bone-fnt); text-align: right; line-height: 2;
  pointer-events: none;
}

/* ── Loader ──────────────────────────────────────── */
#ld {
  position: fixed; inset: 0; z-index: 200;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  transition: opacity .8s ease;
}
#ld.out { opacity: 0; pointer-events: none; }
.ld-dots { display: flex; gap: 8px; }
.ld-dots span {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--gold-dim);
  animation: ldblink 1.4s infinite;
}
.ld-dots span:nth-child(2) { animation-delay: .2s; }
.ld-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes ldblink { 0%,100%{opacity:.12} 50%{opacity:1} }

/* ── Keyframes (defined statically, duration set via JS) ── */
@keyframes toLeft  { from{transform:translateX(0)} to{transform:translateX(-50%)} }
@keyframes toRight { from{transform:translateX(-50%)} to{transform:translateX(0)} }

</style>
</head>

<script>
const SB_URL  = 'https://pgaqdqbjyewwckpslyvx.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBnYXFkcWJqeWV3d2NrcHNseXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMTU4NjIsImV4cCI6MjA4OTc5MTg2Mn0.YKhpyvgXHW3vLYpifJyYHYndlddLzVooKuxoagECZtU';
const _SB = supabase.createClient(SB_URL, SB_ANON);

// 3 rows: direction + speed in seconds
const ROW_CFG = [
  { dir: 'toLeft',  dur: 70 },
  { dir: 'toRight', dur: 55 },
  { dir: 'toLeft',  dur: 85 },
];

const CARD_W   = 356;  // px  (200 × 16/9)
const CARD_H   = 200;  // px
const CARD_GAP = 18;   // px
const PER_SET  = 12;   // cards per half-track

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function makeCard(scene) {
  const url   = scene.thumb_url || scene.image_url || '';
  const title = scene.title || '';
  const card  = document.createElement('div');
  card.className = 'sc';
  card.innerHTML = `<img src="${url}" alt="${title}" loading="lazy" decoding="async"><div class="sc-title">${title}</div>`;
  return card;
}

function buildRow(cfg, scenes, rowIdx) {
  const wrap  = document.createElement('div');
  wrap.className = 'row-wrap';

  const track = document.createElement('div');
  track.className = 'row-track';

  // Pick a unique slice of scenes for this row
  const total = scenes.length;
  const pool  = [];
  for (let i = 0; i < PER_SET; i++) {
    pool.push(scenes[(rowIdx * PER_SET + i) % total]);
  }

  // Two identical sets → seamless loop (track width = 2× set width)
  // translateX(-50%) = exactly -1 set width
  const setWidth = PER_SET * (CARD_W + CARD_GAP); // px per set (no trailing gap simplification)

  [...pool, ...pool].forEach(s => track.appendChild(makeCard(s)));

  // Set animation via JS — avoids CSS-variable-in-animation-duration issues
  track.style.animation = `${cfg.dir} ${cfg.dur}s linear infinite`;

  wrap.appendChild(track);
  return wrap;
}

async function init() {
  let scenes = [];

  try {
    const { data, error } = await _SB
      .from('scenes')
      .select('id, title, image_url, thumb_url')
      .eq('active', true)
      .limit(120);
    if (!error && data && data.length) scenes = shuffle(data);
  } catch(e) { console.warn('[about] scenes', e); }

  if (!scenes.length) {
    try {
      const { data } = await _SB
        .from('scenes')
        .select('id, title, image_url, thumb_url')
        .limit(120);
      if (data && data.length) scenes = shuffle(data);
    } catch(e) { console.warn('[about] fallback', e); }
  }

  // Need at least a few scenes to fill rows
  if (!scenes.length) {
    // No scenes — just show credit on dark bg
    document.getElementById('stage').style.display = 'none';
  } else {
    // Pad if needed
    while (scenes.length < PER_SET * ROW_CFG.length) {
      scenes = [...scenes, ...scenes];
    }
    const stage = document.getElementById('stage');
    ROW_CFG.forEach((cfg, i) => stage.appendChild(buildRow(cfg, scenes, i)));
  }

  setTimeout(() => document.getElementById('cred').classList.add('on'), 150);

  const ld = document.getElementById('ld');
  ld.classList.add('out');
  setTimeout(() => ld.remove(), 900);
}

init();
</script>
